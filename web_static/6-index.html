<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBnB_clone</title>
    <link rel="stylesheet" href="styles/4-common.css">
    <link rel="stylesheet" href="styles/3-header.css">
    <link rel="stylesheet" href="styles/3-footer.css">
    <link rel="stylesheet" href="styles/6-filters.css">
    
</head>
<body>
    <header>
        <div class="logo">

        </div>
    </header>
    <div class="container">
        <section class="filters">
            <div class="inner-search">
                <div class="locations">
                    <h3>States</h3>
                    <h4 class="inner-text">California, Arizona...</h4>
                    <div class="popover st-list">
                        <ul>
                            <h2 class="state-name">Arizona</h2>
                            <ul class="state-list-type">
                                <li>Page</li>
                                <li>Page2</li>
                            </ul>

                            <h2 class="state-name">California</h2>
                            <ul class="state-list-type">
                                <li>San Francisco</li>
                                <li>Los Altos</li>
                            </ul>
                        </ul>
                    </div>
                </div>
                <div class="amenities">
                    <h3>Amenities</h3>
                    <h4 class="inner-text">Internet, Kitchen...</h4>
                    <div class="popover am-list-type">
                        <ul>
                            <li>Internet</li>
                            <li>TV</li>
                            <li>Kitchen</li>
                            <li>Iron</li>
                        </ul>
                    </div>
                </div>
            </div>
            <button class="button">
                <p>Search</p>
            </button>
        </section>
    </div>
    <footer>
        <p>Best School</p>
    </footer>
</body>
</html>
